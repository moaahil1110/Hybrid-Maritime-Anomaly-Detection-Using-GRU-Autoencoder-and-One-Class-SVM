<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1.0" />
    <title>Maritime Anomaly Detection – Live Demo</title>

    <!-- Leaflet CSS -->
    <link
        rel="stylesheet"
        href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    />

    <style>
        /* --- Layout --- */
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: Arial, sans-serif;
            background: #1a1a1a;
            color: #ecf0f1;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }
        header {
            background: #2c3e50;
            padding: 0.8rem 1.2rem;
            text-align: center;
        }
        header h1 { font-size: 1.4rem; }
        .container {
            flex: 1;
            display: flex;
            overflow: hidden;
        }
        #map { flex: 1; }
        aside {
            width: 360px;
            background: #34495e;
            display: flex;
            flex-direction: column;
            padding: 1rem;
            overflow: hidden;
        }
        .panel {
            background: #2c3e50;
            border-radius: 6px;
            padding: 0.8rem;
            margin-bottom: 1rem;
        }
        .panel h3 { margin-bottom: 0.4rem; font-size: 1.05rem; }
        .status-dot {
            display: inline-block;
            width: 10px; height: 10px;
            border-radius: 50%;
            margin-right: 6px;
        }
        .dot-green { background: #27ae60; }
        .dot-red   { background: #e74c3c; }
        .stats-row {
            display: flex;
            justify-content: space-between;
            margin: 0.3rem 0;
        }
        /* --- Log --- */
        #log {
            flex: 1;
            overflow-y: auto;
            font-size: 0.85rem;
        }
        .log-entry {
            margin-bottom: 0.4rem;
            border-radius: 4px;
            padding: 0.35rem 0.5rem;
            line-height: 1.2;
        }
        .log-normal  { background: rgba(52, 152, 219, 0.25); }
        .log-anomaly { background: rgba(231, 76, 60, 0.3); }
        /* --- Scrollbar --- */
        #log::-webkit-scrollbar { width: 6px; }
        #log::-webkit-scrollbar-thumb { background:#7f8c8d; border-radius:3px; }
    </style>
</head>
<body>
    <header>
        <h1>🚢 Maritime Anomaly Detection – Live Demo</h1>
    </header>

    <div class="container">
        <div id="map"></div>

        <aside>
            <!-- Connection panel -->
            <div class="panel">
                <h3>Status</h3>
                <div>
                    <span id="conn-dot" class="status-dot dot-red"></span>
                    <span id="conn-text">Disconnected</span>
                </div>
            </div>

            <!-- Statistics -->
            <div class="panel">
                <h3>Live Stats</h3>
                <div class="stats-row"><span>Vessels Tracked</span><span id="stat-vessels">0</span></div>
                <div class="stats-row"><span>Anomalies</span><span id="stat-anomalies">0</span></div>
                <div class="stats-row"><span>Total Updates</span><span id="stat-updates">0</span></div>
            </div>

            <!-- Detection log -->
            <div class="panel" style="flex:1; display:flex; flex-direction:column;">
                <h3>Detection Log</h3>
                <div id="log">
                    <div class="log-entry log-normal">System initialised – waiting for data…</div>
                </div>
            </div>
        </aside>
    </div>

    <!-- Libraries -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>

    <script>
        /* ---------- CONFIG ---------- */
        localStorage.debug = '*';          // socket.io debug
        const BACKEND_URL  = 'http://127.0.0.1:5003';

        /* ---------- MAP INITIALISATION ---------- */
        const map = L.map('map').setView([63.5, 10], 5);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            maxZoom: 12,
            attribution: '© OpenStreetMap'
        }).addTo(map);

        /* ---------- STATE ---------- */
        const markers = {};          // mmsi -> Leaflet marker
        const trails  = {};          // mmsi -> polyline latlng[]
        let vesselCount   = 0;
        let anomalyCount  = 0;
        let updateCount   = 0;

        /* ---------- UI HANDLERS ---------- */
        const $dot       = document.getElementById('conn-dot');
        const $dotText   = document.getElementById('conn-text');
        const $vessels   = document.getElementById('stat-vessels');
        const $anomalies = document.getElementById('stat-anomalies');
        const $updates   = document.getElementById('stat-updates');
        const $log       = document.getElementById('log');

        function setConnection(connected) {
            if (connected) {
                $dot.classList.remove('dot-red');
                $dot.classList.add('dot-green');
                $dotText.textContent = 'Connected';
            } else {
                $dot.classList.remove('dot-green');
                $dot.classList.add('dot-red');
                $dotText.textContent = 'Disconnected';
            }
        }

        function addLogEntry(text, type='normal') {
            const div = document.createElement('div');
            div.className = `log-entry log-${type}`;
            div.innerHTML = `<small>${new Date().toLocaleTimeString()}</small><br>${text}`;
            $log.prepend(div);
            // Keep last 150 lines
            while ($log.children.length > 150) $log.removeChild($log.lastChild);
        }

        function updateCounters({is_anomaly}) {
            if (is_anomaly) anomalyCount++;
            updateCount++;
            $vessels.textContent   = vesselCount;
            $anomalies.textContent = anomalyCount;
            $updates.textContent   = updateCount;
        }

        function colourFor(anom) { return anom ? '#e74c3c' : '#3498db'; }

        function updateMarker(mmsi, lat, lon, is_anomaly, popupHTML) {
            const colour = colourFor(is_anomaly);
            if (!markers[mmsi]) {
                const marker = L.circleMarker([lat, lon], {
                    radius: 7,
                    color: colour,
                    fillColor: colour,
                    fillOpacity: 0.6,
                    weight: 2
                }).addTo(map);
                marker.bindPopup(popupHTML);
                markers[mmsi] = marker;
                trails[mmsi]  = [];
                vesselCount++;
            } else {
                markers[mmsi].setLatLng([lat, lon]);
                markers[mmsi].setStyle({color: colour, fillColor: colour});
                markers[mmsi].getPopup().setContent(popupHTML);
            }

            // Trail
            trails[mmsi].push([lat, lon]);
            if (trails[mmsi].length > 100) trails[mmsi].shift();

            // Draw/update polyline
            if (!markers[mmsi].polyline) {
                markers[mmsi].polyline = L.polyline(trails[mmsi], {
                    color: colour, weight: 1.5, opacity: 0.4
                }).addTo(map);
            } else {
                markers[mmsi].polyline.setLatLngs(trails[mmsi]).setStyle({color});
            }
        }

        /* ---------- SOCKET.IO ---------- */
        const socket = io(BACKEND_URL, {
            transports: ['websocket', 'polling'],
            timeout: 5000,
            forceNew: true
        });

        socket.on('connect', () => {
            setConnection(true);
            addLogEntry('Connected to backend');
        });

        socket.on('disconnect', reason => {
            setConnection(false);
            addLogEntry(`Disconnected: ${reason}`);
        });

        // Immediate positions – vessel appears quickly
        socket.on('vessel_position', data => {
            const {mmsi, point} = data;
            const [lat, lon] = [point.latitude, point.longitude];
            const popup = `<strong>MMSI: ${mmsi}</strong><br>
                           Lat: ${lat.toFixed(4)}<br>Lon: ${lon.toFixed(4)}<br>
                           Speed: ${point.speed} kn`;
            updateMarker(mmsi, lat, lon, false, popup);
            $vessels.textContent = vesselCount;
        });

        // Hybrid prediction update
        socket.on('update', data => {
            const {mmsi, point, is_anomaly, reason, hybrid_score} = data;
            const [lat, lon] = [point.latitude, point.longitude];
            const popup = `<strong>MMSI: ${mmsi}</strong><br>
                           Speed: ${point.speed} kn<br>
                           Course: ${point.course}°<br>
                           Heading: ${point.heading}°<br>
                           Score: ${hybrid_score}<br>
                           Status: ${is_anomaly ? '<span style="color:#e74c3c;">ANOMALY</span>' : 'Normal'}<br>
                           ${is_anomaly ? 'Reason: '+reason : ''}`;
            updateMarker(mmsi, lat, lon, is_anomaly, popup);

            // Counters + log
            updateCounters({is_anomaly});
            addLogEntry(`MMSI ${mmsi} – ${reason}`, is_anomaly ? 'anomaly' : 'normal');
        });

        // Optional: prediction error events
        socket.on('prediction_error', err => {
            addLogEntry(`Prediction error for MMSI ${err.mmsi}: ${err.error}`, 'anomaly');
        });
    </script>
</body>
</html>
